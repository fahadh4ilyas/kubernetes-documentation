<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <script>
    // Redirect 404 to root with path as hash
    // /kubernetes-documentation/menyiapkan-kubernetes/1-memasang-kubernetes
    // → /kubernetes-documentation/#/menyiapkan-kubernetes/1-memasang-kubernetes
    var segments = window.location.pathname.split('/').filter(function(s) { return s !== ''; });
    var base = '/' + segments[0];                         // '/kubernetes-documentation'
    var rest = segments.slice(1).join('/');               // 'menyiapkan-kubernetes/1-memasang-kubernetes'
    window.location.replace(
      window.location.protocol + '//' + window.location.host +
      base + '/#/' + rest +
      window.location.search +
      window.location.hash
    );
  </script>
</head>
<body></body>
</html>
