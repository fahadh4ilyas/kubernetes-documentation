<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <script>
    // Redirect 404 to root with path as query param
    // /kubernetes-documentation/pods → /kubernetes-documentation/?p=/pods
    var segments = window.location.pathname.split('/');
    // segments: ['', 'kubernetes-documentation', 'pods', ...]
    // Keep first 2 segments (empty + repo name)
    var base = segments.slice(0, 2).join('/');
    var rest = segments.slice(2).join('/');
    window.location.replace(
      window.location.protocol + '//' + window.location.host +
      base + '/?p=/' + rest +
      (window.location.search ? '&q=' + window.location.search.slice(1).replace(/&/g, '~and~') : '') +
      window.location.hash
    );
  </script>
</head>
<body></body>
</html>
